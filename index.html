<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#07c160">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>瓦力小智 - 学习伙伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --primary-color: #07c160;
            --bg-color: #f5f5f5;
            --chat-bg: #f0f0f0;
            --white: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #888888;
            --border-color: #e5e5e5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        /* 登录页面 */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px;
            background: linear-gradient(135deg, #07c160 0%, #04a854 100%);
        }

        .login-container.hidden {
            display: none;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: var(--white);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .logo-section h1 {
            color: var(--white);
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .logo-section p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .login-box {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #06ad56;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            background: #a8d8be;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-color);
            color: var(--text-primary);
            margin-top: 12px;
        }

        .code-btn {
            width: 120px;
            flex-shrink: 0;
            background: var(--bg-color);
            color: var(--primary-color);
            font-size: 14px;
            padding: 14px 8px;
        }

        .code-btn:disabled {
            color: var(--text-secondary);
            background: var(--border-color);
        }

        /* 聊天页面 */
        .chat-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: var(--chat-bg);
        }

        .chat-container.active {
            display: flex;
        }

        .chat-header {
            background: var(--primary-color);
            color: var(--white);
            padding: calc(12px + var(--safe-area-top)) 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: var(--white);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-info h2 {
            font-size: 17px;
            font-weight: 600;
        }

        .chat-header-info p {
            font-size: 12px;
            opacity: 0.8;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: calc(70px + var(--safe-area-bottom));
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary-color);
            color: var(--white);
        }

        .message.bot .message-avatar {
            background: var(--white);
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user .message-content {
            background: var(--primary-color);
            color: var(--white);
            border-bottom-right-radius: 4px;
            margin-right: 10px;
        }

        .message.bot .message-content {
            background: var(--white);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            margin-left: 10px;
        }

        .message.typing .message-content {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 16px 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-message .logo {
            margin-bottom: 16px;
        }

        .welcome-message h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .welcome-message p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .chat-input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--border-color);
            padding: 10px 16px calc(10px + var(--safe-area-bottom));
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 16px;
            resize: none;
            max-height: 120px;
            outline: none;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:disabled {
            background: var(--border-color);
            color: var(--text-secondary);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 加载中 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p class="loading-text">加载中...</p>
    </div>

    <!-- 登录页面 -->
    <div class="login-container" id="loginContainer">
        <div class="logo-section">
            <div class="logo">🤖</div>
            <h1>瓦力小智</h1>
            <p>瓦力贝尔学习力成长中心的学习伙伴</p>
        </div>
        
        <div class="login-box">
            <div class="input-group">
                <label>手机号</label>
                <div class="input-row">
                    <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                    <button class="btn code-btn" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
                </div>
            </div>
            
            <div class="input-group">
                <label>验证码</label>
                <input type="text" id="codeInput" placeholder="请输入验证码" maxlength="6">
            </div>
            
            <button class="btn btn-primary" id="loginBtn" onclick="login()">登录</button>
        </div>
    </div>

    <!-- 聊天页面 -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <div class="chat-header-avatar">🤖</div>
            <div class="chat-header-info">
                <h2>瓦力小智</h2>
                <p id="statusText">在线</p>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <div class="logo">🤖</div>
                <h3>你好，我是瓦力小智！</h3>
                <p>我是瓦力贝尔学习力成长中心的学习伙伴<br>有什么想问我的吗？😊</p>
            </div>
        </div>
        
        <div class="chat-input-area">
            <textarea class="chat-input" id="messageInput" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = window.location.origin;
        
        // 状态
        let currentUser = null;
        let sessionId = null;
        let countdownTimer = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
        });

        // 检查会话
        function checkSession() {
            const stored = localStorage.getItem('wali_session');
            if (stored) {
                try {
                    const session = JSON.parse(stored);
                    currentUser = session.user;
                    sessionId = session.sessionId;
                    showChat();
                } catch (e) {
                    localStorage.removeItem('wali_session');
                }
            }
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // 发送验证码
        async function sendCode() {
            const phone = document.getElementById('phoneInput').value.trim();
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }
            
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_BASE}/mobile/api/send_code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('验证码已发送');
                    startCountdown(60);
                } else {
                    alert(data.message || '发送失败，请重试');
                    btn.disabled = false;
                }
            } catch (e) {
                alert('网络错误，请检查网络后重试');
                btn.disabled = false;
            }
        }

        // 倒计时
        function startCountdown(seconds) {
            const btn = document.getElementById('sendCodeBtn');
            let remaining = seconds;
            
            const update = () => {
                btn.textContent = `${remaining}s后重发`;
                if (remaining <= 0) {
                    clearInterval(countdownTimer);
                    btn.textContent = '获取验证码';
                    btn.disabled = false;
                }
                remaining--;
            };
            
            update();
            countdownTimer = setInterval(update, 1000);
        }

        // 登录
        async function login() {
            const phone = document.getElementById('phoneInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }
            
            if (!/^\d{4,6}$/.test(code)) {
                alert('请输入4-6位验证码');
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            try {
                const res = await fetch(`${API_BASE}/mobile/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, code })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentUser = data.user;
                    sessionId = data.sessionId;
                    localStorage.setItem('wali_session', JSON.stringify({
                        user: currentUser,
                        sessionId: sessionId
                    }));
                    showChat();
                } else {
                    alert(data.message || '登录失败，请重试');
                }
            } catch (e) {
                alert('网络错误，请检查网络后重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        // 显示聊天页面
        function showChat() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('chatContainer').classList.add('active');
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            input.value = '';
            input.style.height = 'auto';
            
            // 添加用户消息
            addMessage('user', text);
            
            // 显示typing状态
            const typingId = addMessage('bot', '', true);
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            try {
                const res = await fetch(`${API_BASE}/mobile/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId,
                        message: text,
                        userId: currentUser?.phone || currentUser?.stu_id
                    })
                });
                
                const data = await res.json();
                
                // 移除typing
                document.getElementById(typingId)?.remove();
                
                if (data.success) {
                    addMessage('bot', data.reply);
                } else {
                    addMessage('bot', data.message || '抱歉，出了点小问题，请重试~');
                }
            } catch (e) {
                document.getElementById(typingId)?.remove();
                addMessage('bot', '网络连接失败，请检查网络后重试~');
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 添加消息
        function addMessage(type, content, isTyping = false) {
            const container = document.getElementById('chatMessages');
            const id = 'msg_' + Date.now();
            
            const div = document.createElement('div');
            div.className = `message ${type}${isTyping ? ' typing' : ''}`;
            div.id = id;
            
            if (isTyping) {
                div.innerHTML = `
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="message-avatar">${type === 'user' ? '👤' : '🤖'}</div>
                    <div class="message-content">${escapeHtml(content)}</div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            return id;
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 键盘事件
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 自动调整高度
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('wali_session');
                location.reload();
            }
        }
    </script>
</body>
</html>
